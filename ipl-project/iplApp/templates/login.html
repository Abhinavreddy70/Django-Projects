<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<style>
    /* Page background */
body {
    margin: 0;
    padding: 0;
    background: #f3f5f9;
    font-family: Arial, Helvetica, sans-serif;
}

/* Center the card */
.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Register card */
.card {
    background: white;
    padding: 35px 30px;
    width: 360px;
    border-radius: 10px;
    box-shadow: 0px 6px 18px rgba(0,0,0,0.15);
    text-align: center;
}

/* Title */
.card h2 {
    margin-bottom: 25px;
    font-size: 28px;
}

/* Labels */
label {
    display: block;
    text-align: left;
    font-size: 14px;
    margin: 10px 0 5px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: #2b6cff;
    box-shadow: 0 0 4px rgba(43,108,255,0.3);
}

/* Register button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #2b6cff;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1f55d6;
}

</style>
<body>

<div class="container">
    <div class="card">
        <h2>login</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username">

            <label>Password</label>
            <input type="password" name="password">

            <button type="submit">login</button>
        </form>
    </div>
</div>

</body>
</html>
