<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Franchises</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .header h2 {
            font-size: 1.8em;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 0.9em;
            opacity: 0.9;
            margin: 0;
        }

        .table-wrapper {
            padding: 15px 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
        }

        thead {
            background-color: #f8f9fa;
        }

        th {
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 3px solid #667eea;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        td {
            padding: 8px 8px;
            border-bottom: 1px solid #e9ecef;
            color: #555;
            font-size: 0.8em;
        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background-color: #f1f3ff;
            transform: scale(1.01);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:nth-child(even):hover {
            background-color: #f1f3ff;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.3);
            display: inline-block;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .action-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }

        .action-btn a {
            color: white;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .container {
                margin: 20px;
                border-radius: 8px;
            }

            .header h2 {
                font-size: 1.8em;
            }

            .table-wrapper {
                padding: 20px;
            }

            th, td {
                padding: 12px 10px;
                font-size: 0.85em;
            }

            .header {
                padding: 20px;
            }

            .action-btn {
                padding: 8px 16px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>IPL Franchises</h2>
            <p>Registered Teams in the Indian Premier League</p>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Short Name</th>
                        <th>Logo</th>
                        <th>actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for franchise in franchises %}
                    <tr>
                        <td>
                            <a href="{% url 'franchise_details' franchise.id %}">
                            {{ franchise.name }}
                            </a>
                        </td>
                        <td>{{ franchise.short_name }}</td>
                        <td>
                            {% if franchise.logo %}
                            
                                <img src="{{ franchise.logo.url }}" alt="Logo" width="50" height="50">
                                {%else%}
                                No Logo
                            {% endif %}
                        </td>
                        <td>
                            <button class="action-btn">
                              <a href="{%url 'update_franchise' franchise.id%}"> 
                                Update
                              </a>
                            </button>
                            <form method="post" action="{% url 'delete_franchise' franchise.id %}" style="display:inline;">
                                {% csrf_token %}
                                <button type="submit" class="action-btn" onclick="return confirm('Are you sure you want to delete this franchise?')">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
