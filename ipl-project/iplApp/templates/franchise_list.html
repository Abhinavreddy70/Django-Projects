<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL Franchises</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h2 {
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1em;
            opacity: 0.95;
            margin-bottom: 20px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .header-btn a {
            color: white;
            text-decoration: none;
        }

        .table-wrapper {
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-spacing: 0;
        }

        thead {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }

        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 700;
            color: #333;
            border-bottom: 3px solid #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px 12px;
            border-bottom: 1px solid #e9ecef;
            color: #555;
            font-size: 0.9em;
        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background-color: #f1f3ff;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:nth-child(even):hover {
            background-color: #f1f3ff;
        }

        td a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        td a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        img {
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.3);
            margin-right: 8px;
            margin-bottom: 5px;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.5);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        .action-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.4);
        }

        .action-btn a {
            color: white;
            text-decoration: none;
        }

        .delete-btn {
            background: linear-gradient(135deg, #f5365c 0%, #d32f2f 100%);
            box-shadow: 0 3px 8px rgba(245, 54, 92, 0.3);
        }

        .delete-btn:hover {
            box-shadow: 0 5px 15px rgba(245, 54, 92, 0.5);
            background: linear-gradient(135deg, #d32f2f 0%, #f5365c 100%);
        }

        @media (max-width: 768px) {
            .container {
                margin: 0;
                border-radius: 8px;
            }

            .header {
                padding: 20px 15px;
            }

            .header h2 {
                font-size: 1.6em;
            }

            .header p {
                font-size: 0.9em;
            }

            .header-btn {
                padding: 10px 24px;
                font-size: 0.85em;
            }

            .table-wrapper {
                padding: 15px;
            }

            th, td {
                padding: 10px 8px;
                font-size: 0.8em;
            }

            .action-btn {
                padding: 8px 14px;
                font-size: 0.75em;
                margin-right: 4px;
            }

            img {
                width: 40px !important;
                height: 40px !important;
            }
        }

        @media (max-width: 480px) {
            .header h2 {
                font-size: 1.4em;
            }

            th, td {
                padding: 8px 6px;
                font-size: 0.75em;
            }

            .action-btn {
                padding: 6px 12px;
                font-size: 0.7em;
                margin-bottom: 8px;
                width: 100%;
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>🏏 IPL Franchises</h2>
            <p>Registered Teams in the Indian Premier League</p>
            <a href="{% url 'player_list' %}" class="header-btn">
                <b>👥 Player List</b>
            </a>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Short Name</th>
                        <th>Logo</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for franchise in franchises %}
                    <tr>
                        <td>
                            <a href="{% url 'franchise_details' franchise.id %}">
                            {{ franchise.name }}
                            </a>
                        </td>
                        <td>{{ franchise.short_name }}</td>
                        <td>
                            {% if franchise.logo %}
                                <img src="{{ franchise.logo.url }}" alt="Logo" width="50" height="50">
                            {% else %}
                                <span style="color: #999;">No Logo</span>
                            {% endif %}
                        </td>
                        <td>
                            <button class="action-btn">
                              <a href="{%url 'update_franchise' franchise.id%}"> 
                                ✏️ Update
                              </a>
                            </button>
                            <form method="post" action="{% url 'delete_franchise' franchise.id %}" style="display:inline;">
                                {% csrf_token %}
                                <button type="submit" class="action-btn delete-btn" onclick="return confirm('Are you sure you want to delete this franchise?')">
                                    🗑️ Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
