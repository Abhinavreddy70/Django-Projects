<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Player</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 320px;
            padding: 18px;
        }

        h1 {
            font-size: 18px;
            color: #222;
            text-align: center;
            margin-bottom: 4px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .subtitle {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-bottom: 12px;
        }

        .header-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-bottom: 12px;
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.2);
        }

        .header-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(102, 126, 234, 0.3);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        form { 
            display: flex; 
            flex-direction: column; 
        }

        form p {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 11px;
            color: #4a4a4a;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #e3e6ee;
            border-radius: 5px;
            font-size: 13px;
            color: #222;
            background: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        input[type="file"] { 
            padding: 6px 8px;
            cursor: pointer;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.12);
            background: #f8f9ff;
        }

        textarea { 
            min-height: 60px; 
            resize: vertical;
            line-height: 1.3;
        }

        .helptext {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
            font-style: italic;
        }

        .errors {
            font-size: 11px;
            color: #d32f2f;
            margin-top: 4px;
            padding: 4px 6px;
            background: #ffebee;
            border-radius: 3px;
            border-left: 2px solid #d32f2f;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 9px 14px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 8px rgba(102, 126, 234, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 12px rgba(102, 126, 234, 0.3);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }

        button:active { 
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(102, 126, 234, 0.15);
        }

        @media (max-width: 480px) {
            .container { 
                padding: 14px; 
                max-width: 100%;
                border-radius: 6px;
            }

            h1 { 
                font-size: 16px;
                margin-bottom: 3px;
            }

            .subtitle {
                font-size: 10px;
                margin-bottom: 10px;
            }

            form p {
                margin-bottom: 8px;
            }

            input,
            select,
            textarea {
                font-size: 12px;
            }

            button {
                padding: 8px 12px;
                font-size: 12px;
                margin-top: 8px;
            }
        }

        @media (max-width: 360px) {
            .container { 
                padding: 12px; 
                max-width: 100%;
                max-width: 300px;
            }

            h1 { 
                font-size: 15px;
            }

            label {
                font-size: 10px;
            }

            input,
            select,
            textarea {
                font-size: 11px;
                padding: 7px 9px;
            }

            button {
                padding: 7px 10px;
                font-size: 11px;
            }

            textarea {
                min-height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Register Player</h1>
        <p class="subtitle">Add new player to IPL</p>
        
        <a href="{% url 'player_list' %}" class="header-btn">
            View Players
        </a>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
