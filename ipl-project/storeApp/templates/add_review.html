<!DOCTYPE html>
<html>
<head>
    <title>Add Review</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            background:white;
            padding:35px;
            width:420px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        form p{
            margin-bottom:15px;
        }

        input, select, textarea{
            width:100%;
            padding:8px;
            border:1px solid #ccc;
            border-radius:5px;
            margin-top:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#667eea;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#5a67d8;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Add Review</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit Review</button>
    </form>
</div>

</body>
</html>
