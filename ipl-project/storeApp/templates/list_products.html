<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #eaeded;
        }

        /* Header */
        .header {
            background-color: #131921;
            color: white;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
        }

        .add-btn {
            display: inline-block;
            margin: 20px 40px;
            padding: 10px 18px;
            background-color: #ff9900;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
        }

        .add-btn:hover {
            background-color: #e68a00;
        }

        /* Product Grid */
        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px 40px;
        }

        .product-card {
            background-color: white;
            padding: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.2s ease-in-out;
            position: relative; /* enable badge positioning within card */
        }

        .product-card:hover {
            transform: scale(1.03);
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: contain;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0 5px 0;
            color: #0f1111;
        }

        .product-description {
            font-size: 14px;
            color: #565959;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 20px;
            color: #B12704;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .buy-btn {
            width: 100%;
            padding: 8px;
            background-color: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .buy-btn:hover {
            background-color: #f7ca00;
        }

        /* discount badge styling always applies */
        .discount-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: #ff9900;
            color: white;
            padding: 5px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
        }

        /* update button style */
        .update-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            background-color: #0170ba;
            color: white;
            text-decoration: none;
            font-size: 14px;
            border-radius: 4px;
        }

        .update-btn:hover {
            background-color: #005999;
        }

        @media (max-width: 600px) {
            .header {
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        Product List
    </div>

    <a href="{% url 'add_product' %}" class="add-btn">+ Add New Product</a>

    <div class="product-container">
        {% for product in products %}
        <div class="product-card">
            <a href="{% url 'product_details' product.id %}" class="product-link">
                <img src="{{ product.image.url }}" alt="no image" class="product-image">

            {% if product.discount > 0 %}
            <div class="discount-badge">
                {{ product.discount }}% OFF
            </div>
            {% endif %}

            <div class="product-name">{{ product.name }}</div>

            <div class="product-description">
                {{ product.description|truncatewords:15 }}
            </div>

            <div class="product-price">
                ₹{{ product.price }}
            </div>

            <button class="buy-btn">Add to Cart</button>
            </a>
            <a href="{% url 'update_product' product.id %}" class="update-btn">update</a>
            <a href="{% url 'delete_product' product.id %}" class="update-btn">delete</a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
