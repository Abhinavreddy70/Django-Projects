<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Product</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#ff4e50,#f9d423);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .delete-box{
            background:white;
            padding:40px;
            width:400px;
            border-radius:12px;
            box-shadow:0 15px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:15px;
            color:#d9534f;
        }

        p{
            margin-bottom:25px;
            font-size:16px;
            color:#555;
        }

        .btn-group{
            display:flex;
            justify-content:center;
            gap:15px;
        }

        button{
            padding:10px 20px;
            border:none;
            border-radius:6px;
            font-size:14px;
            cursor:pointer;
            transition:0.3s ease;
        }

        .btn-danger{
            background:#d9534f;
            color:white;
        }

        .btn-danger:hover{
            background:#c9302c;
        }

        .btn-secondary{
            background:#6c757d;
            color:white;
            text-decoration:none;
            padding:10px 20px;
            border-radius:6px;
            display:inline-block;
            transition:0.3s ease;
        }

        .btn-secondary:hover{
            background:#5a6268;
        }
    </style>
</head>

<body>

    <div class="delete-box">
        <h2>Confirm Product Deletion</h2>
        <p>Are you sure you want to delete this product?</p>

        <form method="post">
            {% csrf_token %}
            <div class="btn-group">
                <button type="submit" class="btn-danger">Delete</button>
                <a href="{% url 'list_product' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

</body>
</html>
