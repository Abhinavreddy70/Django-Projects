<!DOCTYPE html>
<html>
<head>
    <title>Delete Review</title>
    <style>
        body{
            font-family: Arial;
            background: linear-gradient(135deg,#ff4e50,#f9d423);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .delete-box{
            background:white;
            padding:40px;
            width:400px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            color:#d9534f;
            margin-bottom:15px;
        }

        p{
            margin-bottom:20px;
        }

        button{
            padding:8px 15px;
            background:#dc3545;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#c82333;
        }

        a{
            margin-left:15px;
            text-decoration:none;
            color:#555;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="delete-box">
    <h2>Delete Review</h2>
    <p>Are you sure you want to delete this review?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
        <a href="{% url 'list_reviews' %}">Cancel</a>
    </form>
</div>

</body>
</html>
