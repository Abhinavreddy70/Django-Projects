<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} - Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #eaeded;
        }

        .header {
            background-color: #131921;
            color: white;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
        }

        .details-container {
            display: flex;
            gap: 40px;
            padding: 40px;
            background-color: white;
            margin: 40px;
            border-radius: 8px;
        }

        /* LEFT IMAGE */
        .image-section {
            flex: 1;
            text-align: center;
        }

        .image-section img {
            width: 100%;
            max-width: 400px;
            object-fit: contain;
        }

        /* MIDDLE INFO */
        .info-section {
            flex: 2;
        }

        .product-name {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .price {
            font-size: 28px;
            color: #B12704;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .discount {
            color: green;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .description {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        /* RIGHT BUY BOX */
        .buy-box {
            flex: 1;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .stock {
            color: green;
            font-weight: bold;
            margin: 10px 0;
        }

        .buy-btn {
            width: 100%;
            padding: 10px;
            background-color: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .buy-btn:hover {
            background-color: #f7ca00;
        }

        @media (max-width: 900px) {
            .details-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="header">
    Product Details
</div>

<div class="details-container">

    <!-- LEFT -->
    <div class="image-section">
        <img src="{{ product.image.url }}" alt="No image">
    </div>

    <!-- MIDDLE -->
    <div class="info-section">
        <div class="product-name">{{ product.name }}</div>

        {% if product.discount > 0 %}
            <div class="discount">
                {{ product.discount }}% OFF
            </div>
        {% endif %}

        <div class="price">
            ₹{{ product.price }}
        </div>

        <div class="description">
            {{ product.description }}
        </div>
    </div>

    <!-- RIGHT -->
    <div class="buy-box">
        <div class="price">₹{{ product.price }}</div>

        {% if product.stock_available > 0 %}
            <div class="stock">In Stock ({{ product.stock_available }} available)</div>
        {% else %}
            <div style="color:red;font-weight:bold;">Out of Stock</div>
        {% endif %}

        <button class="buy-btn">Add to Cart</button>
    </div>

</div>

</body>
</html>
